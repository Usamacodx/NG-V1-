<svg viewBox="0 0 200 300" xmlns="http://www.w3.org/2000/svg">
  <!-- FRONT VIEW GROUP -->
  <g id="front-view">
    <!-- Shirt Body (COLORABLE ELEMENT) -->
    <path id="shirt-body-front" d="M 60 40 L 80 40 L 80 20 L 100 10 L 120 20 L 120 40 L 140 40 L 135 150 L 140 200 L 130 280 L 130 300 L 70 300 L 70 280 L 60 200 L 65 150 Z" fill="#FF0000" stroke="#333" stroke-width="1.5"/>
    
    <!-- Left Sleeve -->
    <rect id="sleeve-left-front" x="30" y="50" width="30" height="80" fill="#FF0000" stroke="#333" stroke-width="1.5" rx="5"/>
    
    <!-- Right Sleeve -->
    <rect id="sleeve-right-front" x="140" y="50" width="30" height="80" fill="#FF0000" stroke="#333" stroke-width="1.5" rx="5"/>
    
    <!-- Neck line -->
    <ellipse id="neckline-front" cx="100" cy="40" rx="15" ry="12" fill="none" stroke="#333" stroke-width="1"/>
    
    <!-- Buttons (non-colorable) -->
    <circle cx="100" cy="100" r="3" fill="#333"/>
    <circle cx="100" cy="130" r="3" fill="#333"/>
    <circle cx="100" cy="160" r="3" fill="#333"/>
  </g>

  <!-- BACK VIEW GROUP (hidden by default, shown when needed) -->
  <g id="back-view" style="display:none">
    <!-- Shirt Body Back (COLORABLE ELEMENT) -->
    <path id="shirt-body-back" d="M 60 40 L 80 40 L 80 20 L 100 10 L 120 20 L 120 40 L 140 40 L 135 150 L 140 200 L 130 280 L 130 300 L 70 300 L 70 280 L 60 200 L 65 150 Z" fill="#FF0000" stroke="#333" stroke-width="1.5"/>
    
    <!-- Left Sleeve Back -->
    <rect id="sleeve-left-back" x="30" y="50" width="30" height="80" fill="#FF0000" stroke="#333" stroke-width="1.5" rx="5"/>
    
    <!-- Right Sleeve Back -->
    <rect id="sleeve-right-back" x="140" y="50" width="30" height="80" fill="#FF0000" stroke="#333" stroke-width="1.5" rx="5"/>
    
    <!-- Neck line -->
    <ellipse id="neckline-back" cx="100" cy="40" rx="15" ry="12" fill="none" stroke="#333" stroke-width="1"/>
    
    <!-- Back seam (non-colorable) -->
    <line x1="100" y1="40" x2="100" y2="280" stroke="#333" stroke-width="1" stroke-dasharray="5,3"/>
  </g>
</svg>
